name: Secrets Scan

# Blocks any push / PR that introduces a verified secret. Runs on both the
# private and the public (Cyborg7-com/cyborg) repos. TruffleHog detects
# CREDENTIALS; infra-identifier / PII leakage (e.g. the .plan-v2 IPs) is guarded
# separately by the path denylist below + .ossignore / scripts/oss-sync.sh.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secrets-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trufflehog:
    name: TruffleHog (verified secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so diff-scoped scans have a base

      # Skip on the PUBLIC mirror's push only: it's a force-push (replace-all), so
      # base==head and the action errors with no diff. Secrets are already caught on
      # the PRIVATE repo (every commit/PR) BEFORE anything is synced. PRs + the
      # private repo's pushes still run the full diff scan here.
      - name: TruffleHog scan
        if: ${{ github.event_name != 'push' || github.repository != 'Cyborg7-com/cyborg' }}
        uses: trufflesecurity/trufflehog@main
        with:
          # On a PR, scan the PR diff; on push, scan the pushed range. The action
          # derives base/head from the event. --only-verified + --fail = the gate.
          extra_args: --only-verified --fail

  infra-identifier-scan:
    name: Infra identifier leak check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Second belt: TruffleHog won't catch infra identifiers. Fail if a public
      # IP, an EC2 instance id, or an internal hostname lands in tracked files.
      # Skips this workflow file itself and the denylist docs (which name them).
      - name: Grep for infra identifiers
        run: |
          set -uo pipefail
          FAIL=0
          EXCLUDES=(
            ':!.github/workflows/secrets-scan.yml'
            ':!.ossignore'
            ':!**/*.md'
            ':!**/*.svg'   # minified SVG path data false-positives the IPv4 regex
            ':!**/*.test.ts'   # test fixtures legitimately use public DNS / RFC-5737 doc IPs
            ':!**/*.test.tsx'
            ':!**/*.spec.ts'
          )
          # The IPv4 regex (not the literal TOKENS check) additionally skips .svelte:
          # inline SVG <path d="…"> coordinate data false-matches the dotted-quad regex.
          IPV4_EXCLUDES=("${EXCLUDES[@]}" ':!**/*.svelte')

          # 1) Deploy footprint / instance ids — always a leak. The deploy PATH
          #    (/opt/cyborg7) and EC2 instance ids are internal. NOTE: relay.cyborg7.com
          #    is the PUBLIC cloud endpoint clients must hardcode to connect — it is
          #    intentionally public (DNS), so it is NOT treated as a leak.
          TOKENS='i-[0-9a-f]{17}|/opt/cyborg7'
          TOK=$(git grep -nIE "$TOKENS" -- "${EXCLUDES[@]}" || true)
          if [ -n "$TOK" ]; then
            echo "::error::Infra hostname/instance-id leak:"; echo "$TOK"; FAIL=1
          fi

          # 2) Public IPv4 (strict 0-255 octets, word-bounded) MINUS loopback,
          #    private (10 / 172.16-31 / 192.168), link-local (169.254), CGNAT/test
          #    (100.64-127, used in tests), 0.0.0.0 and 255.x. Catches a hardcoded
          #    public IP like 0.0.0.0 even without a :port.
          OCT='(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])'
          IPV4="\\b${OCT}(\\.${OCT}){3}\\b"
          # ALLOW: loopback/private/link-local/CGNAT + RFC-5737 documentation ranges
          # (192.0.2 / 198.51.100 / 203.0.113), multicast+reserved (224-255), and the
          # well-known public DNS / example.com IPs used in SSRF/secure-fetch tests.
          ALLOW='^(127\.|10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[01])\.|169\.254\.|100\.(6[4-9]|[7-9][0-9]|1[01][0-9]|12[0-7])\.|0\.0\.0\.0$|255\.|192\.0\.2\.|198\.51\.100\.|203\.0\.113\.|22[4-9]\.|2[3-5][0-9]\.|8\.8\.8\.8$|8\.8\.4\.4$|1\.1\.1\.1$|1\.0\.0\.1$|93\.184\.216\.34$)'
          IPS=$(git grep -hIoE "$IPV4" -- "${IPV4_EXCLUDES[@]}" | sort -u | grep -vE "$ALLOW" || true)
          if [ -n "$IPS" ]; then
            echo "::error::Public IPv4 address(es) hardcoded in tracked files:"
            echo "$IPS"
            for ip in $IPS; do git grep -nIF "$ip" -- "${IPV4_EXCLUDES[@]}" || true; done
            FAIL=1
          fi

          [ "$FAIL" = 0 ] && echo "No infra identifiers found in tracked code."
          exit $FAIL
