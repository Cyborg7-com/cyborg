name: Bug report
description: Report a reproducible problem in Cyborg7
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug.

        **Do not report security vulnerabilities here.** Public issues are the
        wrong place for them — please follow [`SECURITY.md`](../../SECURITY.md)
        and report privately instead.

        Before opening a new issue, please **search existing issues** (open and
        closed) to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: List the exact steps so we can reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected-actual
    attributes:
      label: Expected vs. actual behavior
      description: What did you expect to happen, and what actually happened?
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Which part?
      description: The area of Cyborg7 most affected by this bug.
      options:
        - Daemon/Server
        - UI
        - Relay
        - CLI
        - Cybo runner
        - Desktop
        - Docs
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Tell us about the environment where you hit this bug.
      value: |
        - OS:
        - Node version (`node --version`):
        - Install method: (Desktop app / web / from source)
        - Run mode: (solo / connected)
        - Provider(s) in use: (Claude Code / Codex / Copilot / OpenCode / Pi)
    validations:
      required: false

  - type: checkboxes
    id: before-submitting
    attributes:
      label: Before submitting
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: This is not a security report (those go through [`SECURITY.md`](../../SECURITY.md)).
          required: true
        - label: I am on a supported Node version (Node.js 22+).
          required: true
