packages:
  - "packages/*"
  - "!packages/app"
# Dependencies allowed to run install/build scripts. pnpm 10 blocks build scripts
# by default and errors (ERR_PNPM_IGNORED_BUILDS) in non-interactive runs unless
# they are listed here. Required for the daemon's native modules to build.
onlyBuiltDependencies:
  - better-sqlite3
  - electron
  - electron-winstaller
  - esbuild
  - lefthook
  - msgpackr-extract
  - node-pty
  - onnxruntime-node
  - sharp
  - workerd
